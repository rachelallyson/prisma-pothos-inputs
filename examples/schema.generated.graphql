type BatchPayload {
  count: Int
}

input BooleanFilter {
  equals: Boolean
  not: BooleanFilter
}

scalar DateTime

input DateTimeFilter {
  equals: DateTime
  gt: DateTime
  gte: DateTime
  in: [DateTime!]
  lt: DateTime
  lte: DateTime
  not: DateTimeFilter
  notIn: [DateTime!]
}

input FloatFilter {
  equals: Float
  gt: Float
  gte: Float
  in: [Float!]
  lt: Float
  lte: Float
  not: FloatFilter
  notIn: [Float!]
}

input IntFilter {
  equals: Int
  gt: Int
  gte: Int
  in: [Int!]
  lt: Int
  lte: Int
  not: IntFilter
  notIn: [Int!]
}

type Mutation {
  createPost(data: PostCreateInput!): Post
  createUser(data: UserCreateInput!): User
  deletePost(where: PostWhereUniqueInput!): Post
  deleteUser(where: UserWhereUniqueInput!): User
  updateManyPosts(data: PostUpdateInput!, where: PostWhereInput): BatchPayload
  updateManyUsers(data: UserUpdateInput!, where: UserWhereInput): BatchPayload
  updatePost(data: PostUpdateInput!, where: PostWhereUniqueInput!): Post
  updateUser(data: UserUpdateInput!, where: UserWhereUniqueInput!): User
}

type Post {
  author: User
  authorId: String
  content: String
  id: ID
  published: Boolean
  title: String
}

input PostCreateInput {
  author: UserCreateNestedOneWithoutPostsInput!
  content: String
  id: String
  published: Boolean
  title: String!
}

input PostCreateNestedOneWithoutAuthorInput {
  connect: PostWhereUniqueInput
  connectOrCreate: PostCreateOrConnectWithoutAuthorInput
  create: PostCreateWithoutAuthorInput
}

input PostCreateOrConnectWithoutAuthorInput {
  create: PostCreateWithoutAuthorInput!
  where: PostWhereUniqueInput!
}

input PostCreateWithoutAuthorInput {
  authorId: String!
  content: String
  id: String
  published: Boolean
  title: String!
}

input PostFindManyArgs {
  orderBy: PostOrderByInput
  skip: Int
  take: Int
  where: PostWhereInput
}

input PostListRelationFilterInput {
  every: PostWhereInput
  none: PostWhereInput
  some: PostWhereInput
}

input PostOrderByInput {
  authorId: SortOrder
  content: SortOrder
  id: SortOrder
  published: SortOrder
  title: SortOrder
}

input PostUpdateInput {
  authorId: String
  content: String
  id: String
  published: Boolean
  title: String
}

input PostWhereInput {
  AND: [PostWhereInput!]
  NOT: PostWhereInput
  OR: [PostWhereInput!]
  author: UserRelationFilterInput
  authorId: StringFilter
  content: StringNullableFilter
  id: StringFilter
  published: BooleanFilter
  title: StringFilter
}

input PostWhereUniqueInput {
  AND: [PostWhereInput!]
  NOT: PostWhereInput
  OR: [PostWhereInput!]
  author: UserRelationFilterInput
  authorId: StringFilter
  content: StringNullableFilter
  id: String
  published: BooleanFilter
  title: StringFilter
}

type Query {
  post(where: PostWhereUniqueInput!): Post
  posts(input: PostFindManyArgs): [Post!]
  user(where: UserWhereUniqueInput!): User
  users(input: UserFindManyArgs): [User!]
}

enum Role {
  ADMIN
  USER
}

input RoleFilter {
  equals: Role
  in: [Role!]
  not: RoleFilter
  notIn: [Role!]
}

enum SortOrder {
  asc
  desc
}

input StringFilter {
  contains: String
  endsWith: String
  equals: String
  gt: String
  gte: String
  in: [String!]
  lt: String
  lte: String
  not: StringFilter
  notIn: [String!]
  startsWith: String
}

input StringNullableFilter {
  contains: String
  endsWith: String
  equals: String
  gt: String
  gte: String
  in: [String!]
  lt: String
  lte: String
  not: StringNullableFilter
  notIn: [String!]
  startsWith: String
}

type User {
  createdAt: DateTime
  email: String
  id: ID
  name: String
  posts: [Post!]
  role: Role
}

input UserCreateInput {
  createdAt: DateTime
  email: String!
  id: String
  name: String
  role: Role
}

input UserCreateNestedOneWithoutPostsInput {
  connect: UserWhereUniqueInput
  connectOrCreate: UserCreateOrConnectWithoutPostsInput
  create: UserCreateWithoutPostsInput
}

input UserCreateOrConnectWithoutPostsInput {
  create: UserCreateWithoutPostsInput!
  where: UserWhereUniqueInput!
}

input UserCreateWithoutPostsInput {
  createdAt: DateTime
  email: String!
  id: String
  name: String
  role: Role
}

input UserFindManyArgs {
  orderBy: UserOrderByInput
  skip: Int
  take: Int
  where: UserWhereInput
}

input UserIdEmailCompoundUniqueInput {
  email: String!
  id: String!
}

input UserOrderByInput {
  createdAt: SortOrder
  email: SortOrder
  id: SortOrder
  name: SortOrder
  role: SortOrder
}

input UserRelationFilterInput {
  is: UserWhereInput
  isNot: UserWhereInput
}

input UserUpdateInput {
  createdAt: DateTime
  email: String
  id: String
  name: String
  role: Role
}

input UserWhereInput {
  AND: [UserWhereInput!]
  NOT: UserWhereInput
  OR: [UserWhereInput!]
  createdAt: DateTimeFilter
  email: StringFilter
  id: StringFilter
  name: StringNullableFilter
  posts: PostListRelationFilterInput
  role: RoleFilter
}

input UserWhereUniqueInput {
  AND: [UserWhereInput!]
  NOT: UserWhereInput
  OR: [UserWhereInput!]
  createdAt: DateTimeFilter
  email: String
  id: String
  id_email: UserIdEmailCompoundUniqueInput
  name: StringNullableFilter
  posts: PostListRelationFilterInput
  role: RoleFilter
}
